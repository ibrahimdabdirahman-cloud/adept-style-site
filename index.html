<script>
(function () {
  function swap() {
    var imgs = document.querySelectorAll('img[data-gsrc]:not([data-gset])');
    for (var i = 0; i < imgs.length; i++) {
      var u = imgs[i].getAttribute('data-gsrc');
      if (u && u.indexOf('{{') === -1) { imgs[i].src = u; imgs[i].setAttribute('data-gset', '1'); }
    }
  }
  swap();
  try { new MutationObserver(swap).observe(document.documentElement, { childList: true, subtree: true }); } catch (e) {}
  var n = 0, iv = setInterval(function () { swap(); if (++n > 40) clearInterval(iv); }, 500); // ~20s safety net
})();
</script>
